<div
  class="login-container d-flex justify-content-center align-items-center vh-100"
>
  <div
    class="card shadow-lg border-0"
    style="width: 22rem; border-radius: 15px"
  >
    <div class="card-header">
      <h5 class="text-center fw-bolder">EMS</h5>
    </div>

    <div class="text-center pt-4">
      <div
        class="auth-icon bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
      >
        <i class="bi bi-lock-fill"></i>
      </div>
    </div>

    <div class="card-body p-4">
      <h3 class="card-title text-center fw-bold mb-4">Login</h3>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="mb-3">
          <label for="email" class="form-label small fw-bold text-muted"
            >Email Address</label
          >
          <input
            type="email"
            formControlName="email"
            class="form-control shadow-sm"
            id="email"
            placeholder="john@company.com"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label small fw-bold text-muted"
            >Password</label
          >
          <div class="input-group">
            <input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              class="form-control shadow-sm"
              id="password"
              placeholder="Password"
            />
            <button
              type="button"
              class="btn btn-outline-secondary"
              (click)="showPassword = !showPassword"
            >
              <i [class]="showPassword ? 'fa fa-eye' : 'fa fa-eye-slash'"></i>
            </button>
          </div>
          
        </div>

        <div class="mb-4">
          <input type="checkbox" formControlName="rememberMe" /> Remember Me
        </div>


        <div class="d-grid gap-2">
          
          @if (errorMessage) {
            <p  class="text-danger text-center small">{{ errorMessage }}</p>
          }
           
          <button
            type="submit"
            class="btn btn-danger py-2 fw-bolder"
            [disabled]="loginForm.invalid"
          >
            Sign In
          </button>
          
        </div>
        <div>
          <a
          (click)="goToForgetPassword()"
          class="nav-link text-danger fs-6 text-center mt-2" style="cursor: pointer;"
        >
          <i class="fa fa-sign-in me-2" style="color:white"></i>
          Forget Password
        </a>
        </div>
      </form>

      <!-- <div class="text-center mt-3">
        <a href="#" class="text-decoration-none small">Forgot password?</a>
      </div> -->
    </div>
  </div>
</div>
