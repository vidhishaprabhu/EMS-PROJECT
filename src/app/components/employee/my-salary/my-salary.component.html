<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="fw-bolder text-center text-dark">Salary History</h2>
      <hr class="w-25 mx-auto" />
    </div>
  </div>
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th class="ps-3">S NO</th>
                <th>EMP ID</th>
                <th>BASIC</th>
                <th>BONUS</th>
                <th>DEDUCTION</th>
                <th>TOTAL</th>
                <th>PAY DATE</th>
              </tr>
            </thead>
            <tbody>
              @for (salary of salaries; track $index) {
              <tr>
                <td class="ps-3 fw-bold">{{$index+1}}</td>
                <td class="fw-bold">{{salary.employee}}</td>
                <td class="fw-bold">{{salary.basic}}</td>
                <td class="fw-bold">{{salary.bonus}}</td>
                <td class="fw-bold">{{salary.deduction}}</td>
                <td class="fw-bold">{{salary.total}}</td>
                <td class="fw-bold">{{salary.createdAt | date:'dd-MM-yyyy'}}</td>
              </tr>
            }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
