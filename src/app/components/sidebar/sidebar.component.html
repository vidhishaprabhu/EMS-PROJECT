<style>
  /* 1. Base Sidebar Styling */
  #sidebarMenu {
    /* Critical Fix: vh-100 makes it exactly the height of the screen */
    height: 100vh !important; 
    
    /* Sticky ensures it stays visible even when the Leaves list is very long */
    position: sticky; 
    top: 0;
    
    /* Allow the sidebar itself to scroll if you have too many menu items */
    overflow-y: auto; 
    
    background: #1e293b !important;
    display: flex;
    flex-direction: column;
    z-index: 1030;
  }

  /* 2. Brand Header */
  .brand-wrapper {
    padding: 1rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    margin-bottom: 1.5rem;
  }
  
  .brand-text {
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ffffff, #9ef37f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* 3. Navigation Links */
  .nav-link {
    color: #94a3b8 !important; /* Muted slate color */
    padding: 12px 18px !important;
    border-radius: 10px !important;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    margin: 4px 0;
  }

  .nav-link i {
    width: 25px;
    font-size: 1.1rem;
    transition: transform 0.2s ease;
  }

  /* 4. Active Link State */
  .active-link {
    background: rgba(158, 243, 127, 0.15) !important; /* Soft green glow */
    color: #9ef37f !important; /* Mint Green */
    font-weight: 600 !important;
    position: relative;
  }

  .active-link::before {
    content: "";
    position: absolute;
    left: 0;
    height: 60%;
    width: 4px;
    background: #9ef37f;
    border-radius: 0 4px 4px 0;
  }

  /* 5. Hover State */
  .nav-link:hover:not(.active-link) {
    background: rgba(255, 255, 255, 0.05) !important;
    color: #ffffff !important;
    transform: translateX(5px);
  }

  .nav-link:hover i {
    transform: scale(1.1);
  }

  /* 6. Section Dividers */
  hr {
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    margin: 1.5rem 0;
  }

  /* 7. Mobile Navbar (The top bar on small screens) */
  .navbar {
    background: #1e293b !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* 8. Responsive Layout Management */
  @media (min-width: 992px) {
    body {
      padding-left: 280px;
      background-color: #f8fafc; /* Light gray background for the main content */
    }
  }
</style>
<nav class="navbar navbar-dark bg-dark d-lg-none p-2 sticky-top shadow-sm" style="height: 100%;">

    <i class="fa fa-bars me-2"></i> 
  </button>
  <span class="text-white fw-bold">EMS Portal</span>
</nav>
