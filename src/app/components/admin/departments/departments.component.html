<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="fw-bolder text-center text-primary">Manage Department</h2>
      <hr class="w-25 mx-auto" />
    </div>
  </div>
  

  <div class="row mb-3">
    <div class="col-12 d-flex justify-content-end">
      <button class="btn btn-primary d-flex align-items-center gap-2" (click)="addDept()">
        <i class="fa fa-plus"></i>
        Add New Departments
      </button>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th scope="col" class="ps-3">S NO</th>
                <th scope="col">NAME</th>
                <th scope="col">DESCRIPTION</th>
                <th scope="col">ACTION</th>
              </tr>
            </thead>
            @for (department of departements; track $index) {
            <tbody>
              <tr>
                <td class="ps-3 fw-bold">{{$index+1}}</td>
                <td class="ps-3 fw-bold">{{department.name}}</td>
                
                <td>
                  <span class="fw-semibold text-dark">{{department.description}}</span>
                </td>
                <td>
                  <div>
                    <button class="btn btn-info me-2" (click)="editDepartment(department._id)">Edit</button>
                    <button class="btn btn-danger" (click)="deleteDepartment(department._id)">Delete</button>
                  </div>
                </td>
              </tr>
            </tbody>
          }
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
