<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="card shadow">
        <div class="card-body">
          <div class="row align-items-center">
            
            <div class="col-md-4 text-center">
              <img 
                [src]="employees.image || 'assets/default-avatar.png'" 
                alt="Employee Image" 
                class="rounded-circle img-fluid border" 
                style="width: 150px; height: 150px; object-fit: cover;"
              >
            </div>

            <div class="col-md-8">
              <h5 class="card-title fw-bold mb-4">Employee Details</h5>
              <p><strong>Name:</strong> {{ employees.name }}</p>
              <p><strong>Department:</strong> {{ employees.department?.name }}</p>
              <p><strong>Gender:</strong> {{ employees.gender }}</p>
              <p><strong>DOB:</strong> {{ employees.dateOfBirth | date: 'dd-MM-yyyy' }}</p>
              <p><strong>Email:</strong> {{ employees.email }}</p>
              <p><strong>Position:</strong> {{ employees.position }}</p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
