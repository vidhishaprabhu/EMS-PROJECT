<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="card shadow">
        <div class="card-body">
          <form [formGroup]="departmentForm">
            @if(isEdit===false){
              <h5 class="card-title fw-bold mb-4">Add New Department</h5>
            }
            @else {
              <h5 class="card-title fw-bold mb-4">Update New Department</h5>
            }
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <span class="text-danger">*</span>
                  <input
                    type="text"
                    formControlName="name"
                    class="form-control"
                    id="name"
                    placeholder="Name"
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label for="description">Description</label>
                  <span class="text-danger">*</span>
                  <textarea
                    class="form-control"
                    formControlName="description"
                    placeholder="Description"
                    id="description"
                  ></textarea>
                  
                </div>
              </div>

              <div class="col-md-12 mt-3">
                @if (isEdit===false) {
                  <button
                  class="btn btn-primary w-100 fw-bolder"
                  (click)="addDepartment()"
                >
                  Add Department
                </button>
                }
                @else {
                  <button
                  class="btn btn-primary w-100 fw-bolder"
                  (click)="addDepartment()"
                >
                  Update Department
                </button>
                }
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
