<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title fw-bold">Change Password</h5>
          <form [formGroup]="changePasswordForm">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <div class="input-group">
                <input
                  class="form-control"
                  formControlName="currentPassword"
                  [type]="showCurrentPassword ? 'text' : 'password'" 
                  placeholder="Enter current password"
                />
                <button type="button" class="btn btn-outline-secondary" (click)="showCurrentPassword = !showCurrentPassword">
                  <i [class]="showCurrentPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
                </button>
              </div>
            </div>

            <!-- New Password -->
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input
                  class="form-control"
                  formControlName="newPassword"
                  [type]="showNewPassword ? 'text' : 'password'" 
                  placeholder="Enter new password"
                />
                <button type="button" class="btn btn-outline-secondary" (click)="showNewPassword = !showNewPassword">
                  <i [class]="showNewPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i> 
                </button>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <div class="input-group">
                <input
                  class="form-control"
                  formControlName="confirmPassword"
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  placeholder="Confirm new password"
                />
                <button type="button" class="btn btn-outline-secondary" (click)="showConfirmPassword = !showConfirmPassword">
                  <i [class]="showConfirmPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" (click)="changePassord()">
              Change Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
