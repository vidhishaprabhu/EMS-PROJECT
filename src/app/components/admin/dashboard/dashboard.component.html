<div class="card">
  <div class="card-header">
    <h4 class="fw-bolder">Dashboard Overview</h4>
  </div>
  <div class="card-group mt-4 mb-3">
    <div class="card shadow-sm border-1 border-radius-rounded me-3">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h6 class="text-muted mb-1">Total Employees</h6>
          <h3 class="fw-bolder mb-0">{{ this.totalEmp }}</h3>
        </div>

        <div
          class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
          style="width: 50px; height: 50px"
        >
          <i class="fa fa-users"></i>
        </div>
      </div>
    </div>
    <div class="card shadow-sm border-1 me-3">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h6 class="text-muted mb-1">Total Departments</h6>
          <h3 class="fw-bolder mb-0">{{ this.totalDept }}</h3>
        </div>

        <div
          class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
          style="width: 50px; height: 50px"
        >
          <i class="fa fa-sitemap"></i>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-1 me-3">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h6 class="text-muted mb-1">Total Salary</h6>
          <h3 class="fw-bolder mb-0">₹{{ this.totalSalary }}</h3>
        </div>

        <div
          class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
          style="width: 50px; height: 50px"
        >
          <i class="fa fa-money" aria-hidden="true"></i>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="card mt-5">
  <div class="card-header">
    <h4 class="fw-bolder">Leave Details</h4>
  </div>
  <div class="card-group mt-4 mb-3">
    <div class="card shadow-sm border-1 border-radius-rounded me-3">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h6 class="text-muted mb-1">Leave Applied</h6>
          <h3 class="fw-bolder mb-0">{{ this.totalLeave }}</h3>
        </div>

        <div
          class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center"
          style="width: 50px; height: 50px"
        >
          <i class="fa fa-users"></i>
        </div>
      </div>
    </div>
  </div>
</div>
