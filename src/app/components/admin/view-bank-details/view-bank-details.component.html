<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="fw-bolder text-center text-dark">Manage Bank Details</h2>
      <hr class="w-25 mx-auto" />
    </div>
  </div>

  <form class="d-flex"></form>

  <div class="row mb-3">
    <div class="col-12 d-flex justify-content-end align-items-center">
      <button
        class="btn btn-danger d-flex align-items-center gap-2 fw-bolder"
        [routerLink]="['/admin/update-bank-details', employees._id]"
      >
        <i class="fa fa-plus"></i>
        Add Bank Details
      </button>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th scope="col">ACCOUNT NO</th>
                <th scope="col">BANK NAME</th>
                <th scope="col">IFSC CODE</th>
                <th scope="col">BRANCH NAME</th>
                <th scope="col">ACTION</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>{{ employees.bankDetails.accountNumber }}</td>
                <td>{{ employees.bankDetails.bankName }}</td>
                <td>{{ employees.bankDetails.ifscCode }}</td>
                <td>{{ employees.bankDetails.branch }}</td>
                <td><button class="btn btn-primary fw-bold">Edit</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
